# ============================================================
# Confluent Platform 8.x — Base Service Definitions
# ============================================================
# Per-node compose files override service-specific settings
# (KAFKA_NODE_ID, ADVERTISED_LISTENERS, etc.) and select which
# services run on each EC2 instance.
#
# Node layout (latency-optimized):
#   Node 1-3: Kafka brokers only (page cache isolation)
#   Node 4:   Connect Worker 1 + Connect Worker 2 + Schema Registry
#   Node 5:   Control Center + ksqlDB + REST Proxy + Flink + Monitoring
#
# Usage (on each node):
#   docker compose -f docker-compose.yml -f docker-compose.<node-overlay>.yml up -d
#   Example: docker compose -f docker-compose.yml -f docker-compose.broker1.yml up -d
#
# All services use network_mode: host — containers bind directly
# to the EC2 host network. No Docker port mapping needed.
# ============================================================

services:

  # ===========================================================
  # Kafka Broker (Nodes 1-3 — brokers only, nothing else)
  # ===========================================================
  broker:
    image: confluentinc/cp-server:${CP_VERSION}
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/9092 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    volumes:
      - ${KAFKA_DATA_DIR}:/data/kafka
      - ./monitoring/jmx-exporter:/etc/jmx-exporter:ro
    environment:
      # --- KRaft (overridden per node) ---
      KAFKA_NODE_ID: "SET_IN_NODE_OVERLAY"
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: ${CLUSTER_ID}
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@${BROKER_1_IP}:9093,2@${BROKER_2_IP}:9093,3@${BROKER_3_IP}:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # --- Listeners (ADVERTISED_LISTENERS overridden per node) ---
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: "SET_IN_NODE_OVERLAY"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # --- Storage ---
      KAFKA_LOG_DIRS: ${KAFKA_DATA_DIR}/kraft-combined-logs

      # --- Replication ---
      KAFKA_DEFAULT_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR}
      KAFKA_MIN_INSYNC_REPLICAS: ${KAFKA_MIN_INSYNC_REPLICAS}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: ${KAFKA_MIN_INSYNC_REPLICAS}
      KAFKA_CONFLUENT_LICENSE_TOPIC_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR}
      KAFKA_CONFLUENT_BALANCER_TOPIC_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR}
      CONFLUENT_METRICS_REPORTER_TOPIC_REPLICAS: ${KAFKA_REPLICATION_FACTOR}

      # --- Retention ---
      KAFKA_LOG_RETENTION_HOURS: ${KAFKA_LOG_RETENTION_HOURS}
      KAFKA_LOG_RETENTION_BYTES: ${KAFKA_LOG_RETENTION_BYTES}
      KAFKA_LOG_SEGMENT_BYTES: ${KAFKA_LOG_SEGMENT_BYTES}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: ${KAFKA_AUTO_CREATE_TOPICS}

      # --- Performance (from tuning profile) ---
      KAFKA_NUM_IO_THREADS: ${KAFKA_NUM_IO_THREADS}
      KAFKA_NUM_NETWORK_THREADS: ${KAFKA_NUM_NETWORK_THREADS}
      KAFKA_SOCKET_SEND_BUFFER_BYTES: ${KAFKA_SOCKET_SEND_BUFFER_BYTES}
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: ${KAFKA_SOCKET_RECEIVE_BUFFER_BYTES}
      KAFKA_SOCKET_REQUEST_MAX_BYTES: ${KAFKA_SOCKET_REQUEST_MAX_BYTES:-104857600}
      KAFKA_NUM_PARTITIONS: ${KAFKA_NUM_PARTITIONS:-3}

      # --- Metrics ---
      KAFKA_METRIC_REPORTERS: io.confluent.metrics.reporter.ConfluentMetricsReporter
      CONFLUENT_METRICS_REPORTER_BOOTSTRAP_SERVERS: ${BROKER_1_IP}:9092,${BROKER_2_IP}:9092,${BROKER_3_IP}:9092
      CONFLUENT_METRICS_ENABLE: "true"
      # JMX Exporter Agent — exports Kafka metrics to Prometheus on port 9404
      # Requires: bash monitoring/jmx-exporter/download-jmx-agent.sh (run once per node)
      EXTRA_ARGS: -javaagent:/etc/jmx-exporter/jmx_prometheus_javaagent.jar=${JMX_EXPORTER_PORT}:/etc/jmx-exporter/broker.yml

  # ===========================================================
  # Schema Registry (Node 4 — co-located with Connect workers)
  # ===========================================================
  schema-registry:
    image: confluentinc/cp-schema-registry:${CP_VERSION}
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${SCHEMA_REGISTRY_PORT}/subjects || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    volumes:
      - ./monitoring/jmx-exporter:/etc/jmx-exporter:ro
    environment:
      SCHEMA_REGISTRY_HOST_NAME: ${CONNECT_1_IP}
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: ${BROKER_1_IP}:9092,${BROKER_2_IP}:9092,${BROKER_3_IP}:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:${SCHEMA_REGISTRY_PORT}
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR}
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: backward
      SCHEMA_REGISTRY_HEAP_OPTS: "-Xms1g -Xmx1g"
      # JMX Exporter Agent — exports Schema Registry metrics to Prometheus on port 9406
      SCHEMA_REGISTRY_OPTS: -javaagent:/etc/jmx-exporter/jmx_prometheus_javaagent.jar=9406:/etc/jmx-exporter/schema-registry.yml

  # ===========================================================
  # Connect Worker 1 — Forward CDC (SQL Server -> Kafka -> Aurora)
  # Node 4, port 8083
  # ===========================================================
  connect-1:
    image: cdc-connect:${CP_VERSION}
    # NOTE: Image must be built separately using docker-compose.connect-build.yml
    # Build command: docker compose -f docker-compose.connect-build.yml build
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    volumes:
      - ./monitoring/jmx-exporter:/etc/jmx-exporter:ro
    environment:
      CONNECT_BOOTSTRAP_SERVERS: ${BROKER_1_IP}:9092,${BROKER_2_IP}:9092,${BROKER_3_IP}:9092
      CONNECT_REST_PORT: 8083
      CONNECT_LISTENERS: http://0.0.0.0:8083
      CONNECT_REST_ADVERTISED_HOST_NAME: ${CONNECT_1_IP}
      CONNECT_GROUP_ID: connect-forward

      # --- Internal topics (unique per Connect cluster) ---
      CONNECT_CONFIG_STORAGE_TOPIC: connect-forward-configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect-forward-offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect-forward-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR}
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR}
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR}

      # --- Converters (localhost — SR is co-located on Node 4) ---
      CONNECT_KEY_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_KEY_CONVERTER_SCHEMA_REGISTRY_URL: http://localhost:${SCHEMA_REGISTRY_PORT}
      CONNECT_VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://localhost:${SCHEMA_REGISTRY_PORT}

      # --- Performance ---
      CONNECT_OFFSET_FLUSH_INTERVAL_MS: ${CONNECT_OFFSET_FLUSH_INTERVAL_MS}
      CONNECT_CONSUMER_MAX_POLL_RECORDS: ${CONNECT_CONSUMER_MAX_POLL_RECORDS}
      CONNECT_PRODUCER_BATCH_SIZE: ${CONNECT_PRODUCER_BATCH_SIZE}
      CONNECT_PRODUCER_LINGER_MS: ${CONNECT_PRODUCER_LINGER_MS}
      CONNECT_CONSUMER_FETCH_MAX_BYTES: ${CONNECT_CONSUMER_FETCH_MAX_BYTES}

      # --- Producer overrides (from tuning profile) ---
      CONNECT_PRODUCER_OVERRIDE_COMPRESSION_TYPE: ${CONNECT_PRODUCER_COMPRESSION_TYPE}

      # --- Consumer overrides (from tuning profile) ---
      CONNECT_CONSUMER_OVERRIDE_FETCH_MIN_BYTES: ${CONNECT_CONSUMER_FETCH_MIN_BYTES}
      CONNECT_CONSUMER_OVERRIDE_FETCH_MAX_WAIT_MS: ${CONNECT_CONSUMER_FETCH_MAX_WAIT_MS}

      # --- Plugin path ---
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components,/etc/kafka-connect/jars

      # --- JVM ---
      KAFKA_HEAP_OPTS: "-Xms4g -Xmx4g"

      # --- JMX (port 9404) — exports Connect metrics to Prometheus ---
      EXTRA_ARGS: -javaagent:/etc/jmx-exporter/jmx_prometheus_javaagent.jar=9404:/etc/jmx-exporter/connect.yml

  # ===========================================================
  # Connect Worker 2 — Reverse CDC (Aurora -> Kafka -> SQL Server)
  # Node 4, port 8084
  # ===========================================================
  connect-2:
    image: cdc-connect:${CP_VERSION}
    # NOTE: Image must be built separately using docker-compose.connect-build.yml
    # Build command: docker compose -f docker-compose.connect-build.yml build
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8084/connectors || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    volumes:
      - ./monitoring/jmx-exporter:/etc/jmx-exporter:ro
    environment:
      CONNECT_BOOTSTRAP_SERVERS: ${BROKER_1_IP}:9092,${BROKER_2_IP}:9092,${BROKER_3_IP}:9092
      CONNECT_REST_PORT: 8084
      CONNECT_LISTENERS: http://0.0.0.0:8084
      CONNECT_REST_ADVERTISED_HOST_NAME: ${CONNECT_1_IP}
      CONNECT_GROUP_ID: connect-reverse

      # --- Internal topics (unique per Connect cluster) ---
      CONNECT_CONFIG_STORAGE_TOPIC: connect-reverse-configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect-reverse-offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect-reverse-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR}
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR}
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR}

      # --- Converters (localhost — SR is co-located on Node 4) ---
      CONNECT_KEY_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_KEY_CONVERTER_SCHEMA_REGISTRY_URL: http://localhost:${SCHEMA_REGISTRY_PORT}
      CONNECT_VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://localhost:${SCHEMA_REGISTRY_PORT}

      # --- Performance ---
      CONNECT_OFFSET_FLUSH_INTERVAL_MS: ${CONNECT_OFFSET_FLUSH_INTERVAL_MS}
      CONNECT_CONSUMER_MAX_POLL_RECORDS: ${CONNECT_CONSUMER_MAX_POLL_RECORDS}
      CONNECT_PRODUCER_BATCH_SIZE: ${CONNECT_PRODUCER_BATCH_SIZE}
      CONNECT_PRODUCER_LINGER_MS: ${CONNECT_PRODUCER_LINGER_MS}
      CONNECT_CONSUMER_FETCH_MAX_BYTES: ${CONNECT_CONSUMER_FETCH_MAX_BYTES}

      # --- Producer overrides (from tuning profile) ---
      CONNECT_PRODUCER_OVERRIDE_COMPRESSION_TYPE: ${CONNECT_PRODUCER_COMPRESSION_TYPE}

      # --- Consumer overrides (from tuning profile) ---
      CONNECT_CONSUMER_OVERRIDE_FETCH_MIN_BYTES: ${CONNECT_CONSUMER_FETCH_MIN_BYTES}
      CONNECT_CONSUMER_OVERRIDE_FETCH_MAX_WAIT_MS: ${CONNECT_CONSUMER_FETCH_MAX_WAIT_MS}

      # --- Plugin path ---
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components,/etc/kafka-connect/jars

      # --- JVM ---
      KAFKA_HEAP_OPTS: "-Xms4g -Xmx4g"

      # --- JMX (port 9405 — avoids conflict with connect-1 on 9404) ---
      EXTRA_ARGS: -javaagent:/etc/jmx-exporter/jmx_prometheus_javaagent.jar=9405:/etc/jmx-exporter/connect.yml

  # ===========================================================
  # Control Center (Node 5)
  # ===========================================================
  control-center:
    image: confluentinc/cp-enterprise-control-center-next-gen:${CONTROL_CENTER_VERSION}
    network_mode: host
    restart: unless-stopped
    environment:
      CONTROL_CENTER_BOOTSTRAP_SERVERS: ${BROKER_1_IP}:9092,${BROKER_2_IP}:9092,${BROKER_3_IP}:9092
      CONTROL_CENTER_SCHEMA_REGISTRY_URL: http://${CONNECT_1_IP}:${SCHEMA_REGISTRY_PORT}
      CONTROL_CENTER_SCHEMA_REGISTRY_ENABLE: "true"
      CONTROL_CENTER_CONNECT_CONNECT-FORWARD_CLUSTER: http://${CONNECT_1_IP}:8083
      CONTROL_CENTER_CONNECT_CONNECT-REVERSE_CLUSTER: http://${CONNECT_1_IP}:8084
      CONTROL_CENTER_KSQL_KSQLDB-CDC_URL: http://localhost:${KSQLDB_PORT}
      CONTROL_CENTER_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR}
      # Must match _confluent-metrics partition count (default 12 from Metrics Reporter).
      # If set lower, MetricsAggregateStore-changelog gets wrong partition count
      # and Kafka Streams crash-loops with "invalid partitions: expected 12; actual N".
      CONTROL_CENTER_INTERNAL_TOPICS_PARTITIONS: 12
      CONTROL_CENTER_MONITORING_INTERCEPTOR_TOPIC_PARTITIONS: 12
      CONTROL_CENTER_HEAP_OPTS: "-Xms4g -Xmx4g"
      PORT: 9021

  # ===========================================================
  # ksqlDB (Node 5)
  # ===========================================================
  ksqldb-server:
    image: confluentinc/cp-ksqldb-server:${CP_VERSION}
    network_mode: host
    restart: unless-stopped
    environment:
      KSQL_BOOTSTRAP_SERVERS: ${BROKER_1_IP}:9092,${BROKER_2_IP}:9092,${BROKER_3_IP}:9092
      KSQL_LISTENERS: http://0.0.0.0:${KSQLDB_PORT}
      KSQL_KSQL_SCHEMA_REGISTRY_URL: http://${CONNECT_1_IP}:${SCHEMA_REGISTRY_PORT}
      KSQL_KSQL_SERVICE_ID: ksql-cdc-poc
      KSQL_KSQL_STREAMS_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR}
      KSQL_KSQL_INTERNAL_TOPIC_REPLICAS: ${KAFKA_REPLICATION_FACTOR}
      KSQL_HEAP_OPTS: "-Xms4g -Xmx4g"

  # ===========================================================
  # REST Proxy (Node 5)
  # ===========================================================
  rest-proxy:
    image: confluentinc/cp-kafka-rest:${CP_VERSION}
    network_mode: host
    restart: unless-stopped
    environment:
      KAFKA_REST_HOST_NAME: ${MONITOR_1_IP}
      KAFKA_REST_BOOTSTRAP_SERVERS: ${BROKER_1_IP}:9092,${BROKER_2_IP}:9092,${BROKER_3_IP}:9092
      KAFKA_REST_LISTENERS: http://0.0.0.0:8082
      KAFKA_REST_SCHEMA_REGISTRY_URL: http://${CONNECT_1_IP}:${SCHEMA_REGISTRY_PORT}
      KAFKAREST_HEAP_OPTS: "-Xms1g -Xmx1g"

  # ===========================================================
  # Apache Flink® (Node 5)
  # ===========================================================
  flink-jobmanager:
    image: flink:1.19-java11
    network_mode: host
    restart: unless-stopped
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: ${MONITOR_1_IP}
        jobmanager.rpc.port: 6123
        rest.port: ${FLINK_JOBMANAGER_PORT}
        rest.address: 0.0.0.0

  flink-taskmanager:
    image: flink:1.19-java11
    network_mode: host
    restart: unless-stopped
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: ${MONITOR_1_IP}
        jobmanager.rpc.port: 6123
        taskmanager.numberOfTaskSlots: 4

  # ===========================================================
  # Prometheus (Node 5)
  # ===========================================================
  prometheus:
    image: prom/prometheus:v3.4.1
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
      - --web.listen-address=:${PROMETHEUS_PORT}

  # ===========================================================
  # Grafana (Node 5 — port 8080 for Cloud9 preview)
  # ===========================================================
  grafana:
    image: grafana/grafana:11.6.0
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      GF_SERVER_HTTP_PORT: ${GRAFANA_PORT}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      AWS_REGION: ${AWS_REGION}

  # ===========================================================
  # Alertmanager (Node 5)
  # ===========================================================
  alertmanager:
    image: prom/alertmanager:v0.28.1
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./monitoring/alertmanager:/etc/alertmanager:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --web.listen-address=:9093

  # ===========================================================
  # Node Exporter (all nodes)
  # ===========================================================
  node-exporter:
    image: prom/node-exporter:v1.9.1
    network_mode: host
    restart: unless-stopped
    command:
      - --path.rootfs=/host
      - --web.listen-address=:9100
      - --collector.textfile.directory=/textfile
    volumes:
      - /:/host:ro,rslave
      - /var/lib/node_exporter/textfile_collector:/textfile:ro

  # ===========================================================
  # Profile Exporter — writes cdc_tuning_mode metric for node-exporter textfile collector
  # Reads .env every 15s; metric value: 1=streaming, 0=snapshot
  # Only active on Node 5 (monitor); harmless no-op on other nodes (no .env mounted)
  # ===========================================================
  profile-exporter:
    image: alpine:3.20
    network_mode: host
    restart: unless-stopped
    volumes:
      - ${DEPLOY_DIR}/.env:/app/.env:ro
      - ${DEPLOY_DIR}/monitoring/profile-exporter.sh:/app/profile-exporter.sh:ro
      - /var/lib/node_exporter/textfile_collector:/textfile
    command: sh /app/profile-exporter.sh

  # ===========================================================
  # cAdvisor (all nodes — port 9080 to avoid Grafana 8080 conflict)
  # ===========================================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    network_mode: host
    restart: unless-stopped
    command:
      - --port=9080
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true

volumes:
  prometheus-data:
  grafana-data:
